frigate:
  # Use one of:
  # - http://frigate:5000 for internal unauthenticated API from a Docker network
  # - http://host:8971 for authenticated API without TLS
  # - https://host:8971 for authenticated API with TLS
  base_url: "https://frigate.example.com:8971"
  username: "backup-user"
  password: null
  password_file: "/run/secrets/frigate_password"
  verify_tls: true
  ca_bundle: null
  request_timeout_seconds: 60

mqtt:
  host: "mosquitto"
  port: 1883
  topic_prefix: "frigate"
  username: null
  password: null
  password_file: null
  client_id: "frigate-media-backup-test"

state:
  path: "/state/state.sqlite"
  tmp_dir: "/state/tmp"

uploads:
  # Snapshot MQTT topics can be noisy and may include indoor cameras, so snapshots are opt-in.
  include_snapshots: false
  include_clips: true
  clip_padding_before_seconds: 5
  clip_padding_after_seconds: 5

destinations:
  - type: s3
    name: b2
    bucket: "your-bucket"
    prefix: "frigate-test/"
    endpoint_url: "https://s3.your-region.backblazeb2.com"
    region: "your-region"
    access_key_id_env: "B2_KEY_ID"
    secret_access_key_env: "B2_APP_KEY"
