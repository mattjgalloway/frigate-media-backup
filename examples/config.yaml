frigate:
  base_url: "http://frigate:5000"
  username: null
  password: null
  password_file: null
  verify_tls: true
  ca_bundle: null
  request_timeout_seconds: 60

mqtt:
  host: "mosquitto"
  port: 1883
  topic_prefix: "frigate"
  username: null
  password: null
  password_file: null
  client_id: "frigate-media-backup"

state:
  path: "/state/state.sqlite"
  tmp_dir: "/state/tmp"

uploads:
  snapshots:
    # Snapshot MQTT topics can be noisy and may include indoor cameras, so snapshots are opt-in.
    enabled: false
    # Empty lists mean all cameras/objects.
    cameras: []
    objects: []
    # Useful when snapshot topics update frequently.
    min_interval_seconds: 60

  clips:
    enabled: true
    # Empty list means all cameras.
    cameras: []
    padding_before_seconds: 5
    padding_after_seconds: 5

destinations:
  - type: filesystem
    name: local
    path: "/backup/frigate"

  # Backblaze B2 via the S3-compatible API:
  #
  # - type: s3
  #   name: b2
  #   bucket: "your-bucket"
  #   prefix: "frigate/"
  #   endpoint_url: "https://s3.your-region.backblazeb2.com"
  #   region: "your-region"
  #   access_key_id_env: "B2_KEY_ID"
  #   secret_access_key_env: "B2_APP_KEY"

  # SFTP:
  #
  # - type: sftp
  #   name: offsite
  #   host: "backup.example.com"
  #   port: 22
  #   username: "frigate"
  #   key_file: "/run/secrets/sftp_key"
  #   path: "/srv/frigate"
